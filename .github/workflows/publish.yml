name: Publish crate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    timeout-minutes: 20
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --locked

      - name: Verify package
        run: cargo publish --dry-run --locked

      - name: Authenticate with crates.io trusted publishing
        id: crates_auth
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish crate
        shell: pwsh
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if (-not $env:CARGO_REGISTRY_TOKEN) {
            throw 'No crates.io token is available. Configure trusted publishing or the release environment secret.'
          }
          cargo publish --locked
